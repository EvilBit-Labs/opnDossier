# cyclonedx-gomod: installed via go install in CI (mise shim causes trust issues in goreleaser subprocesses)

[tools]
act                                         = "latest"
bun                                         = "1.3.11"
cosign                                      = "3.0.5"
git-cliff                                   = "2.12.0"
"github:anchore/quill"                      = "0.7.1"
go                                          = "1.26.1"
"go:github.com/google/go-licenses"          = "1.6.0"
"go:github.com/securego/gosec/v2/cmd/gosec" = "latest"
golangci-lint                               = "2.11.4"
goreleaser                                  = "2.15.2"
just                                        = "1.48.1"
markdownlint-cli2                           = "0.22.0"
"pipx:mdformat"                             = { version = "1.0.0", uvx_args = "--with mdformat-gfm --with mdformat-admon --with mdformat-config --with mdformat-footnote --with mdformat-simple-breaks --with mdformat-web --with mdformat-ruff --with mdformat-gfm-alerts --with mdformat-toc --with mdformat-front-matters" }
"pipx:mkdocs"                               = { version = "1.6.1", uvx_args = "--with mkdocs-material --with pymdown-extensions" }
"pipx:pre-commit"                           = "4.5.1"
python                                      = "3.14.3"
uv                                          = "0.11.2"

# Many of these settings are defaults, but we are explicit in case they change in the future and to make it clear to users what is enabled.
[settings]
activate_aggressive = true
env_cache           = true
exec_auto_install   = true
github_attestations = true
lockfile            = true
pin                 = true
slsa                = true

[settings.npm]
package_manager = "bun"

[settings.pipx]
uvx = true
