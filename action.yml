---
name: "opnDossier"
description: "Audit and document OPNsense configurations in your GitHub Actions workflow"

# See: https://docs.github.com/en/actions/reference/workflows-and-actions/metadata-syntax
branding:
  icon: "shield"
  color: "blue"

inputs:
  command:
    description: "opnDossier sub-command to run: audit | convert | diff | display | sanitize | validate | version"
    required: false
    default: "audit"
  config-file:
    description: "Path to the OPNsense config.xml file (relative to workspace root)"
    required: true
  format:
    description: "Output format for convert/audit: markdown | json | yaml | text | html"
    required: false
    default: ""
  output:
    description: "Path to write the output file (relative to workspace root)"
    required: false
    default: ""
  args:
    description: "Any additional arguments to pass verbatim to opnDossier"
    required: false
    default: ""
  version:
    description: "Image tag to pull from ghcr.io/evilbit-labs/opndossier (e.g. v1.2.0 or latest)"
    required: false
    default: "latest"

runs:
  using: "composite"
  steps:
    - name: Run opnDossier
      shell: bash
      env:
        INPUT_COMMAND: ${{ inputs.command }}
        INPUT_CONFIG_FILE: ${{ inputs.config-file }}
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_VERSION: ${{ inputs.version }}
        INPUT_ARGS: ${{ inputs.args }}
        INPUT_OUTPUT_FILE: ${{ inputs.output }}
      run: |
        set -euo pipefail

        # --- Input validation ---
        if [[ -z "${INPUT_CONFIG_FILE}" ]]; then
          echo "::error::config-file input is required" && exit 1
        fi

        if [[ ! "${INPUT_VERSION}" =~ ^[a-zA-Z0-9._-]+$ ]]; then
          echo "::error::version input contains invalid characters: ${INPUT_VERSION}" && exit 1
        fi

        case "${INPUT_COMMAND}" in
          audit|completion|config|convert|diff|display|man|sanitize|validate|version) ;;
          *) echo "::error::Invalid command '${INPUT_COMMAND}'. Must be one of: audit, convert, diff, display, sanitize, validate, version"; exit 1 ;;
        esac

        if [[ -n "${INPUT_FORMAT}" ]]; then
          case "${INPUT_FORMAT}" in
            markdown|json|yaml|text|html) ;;
            *) echo "::error::Invalid format '${INPUT_FORMAT}'. Must be: markdown, json, yaml, text, or html"; exit 1 ;;
          esac
        fi

        # --- Pull image with actionable error ---
        IMAGE="ghcr.io/evilbit-labs/opndossier:${INPUT_VERSION}"
        if ! docker pull "${IMAGE}" 2>&1; then
          echo "::error::Failed to pull ${IMAGE}. Check that the version '${INPUT_VERSION}' exists at https://ghcr.io/evilbit-labs/opndossier"
          exit 1
        fi

        # --- Build argument list ---
        ARGS=("${INPUT_COMMAND}" "${INPUT_CONFIG_FILE}")

        if [[ -n "${INPUT_FORMAT}" ]]; then
          ARGS+=("--format" "${INPUT_FORMAT}")
        fi

        if [[ -n "${INPUT_OUTPUT_FILE}" ]]; then
          ARGS+=("--output" "${INPUT_OUTPUT_FILE}")
        fi

        # Append any extra user-supplied args (word-split intentional)
        # Use read -ra to split on whitespace without glob expansion
        if [[ -n "${INPUT_ARGS}" ]]; then
          read -ra EXTRA <<< "${INPUT_ARGS}"
          ARGS+=("${EXTRA[@]}")
        fi

        docker run --rm \
          --volume "${GITHUB_WORKSPACE}:/data" \
          --workdir /data \
          "${IMAGE}" \
          "${ARGS[@]}"
