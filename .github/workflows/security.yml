#
# Security scanning workflow for opnDossier
#
# Runs continuous vulnerability scans:
# - govulncheck: Go vulnerability database scan across the module graph
# - Trivy (filesystem): SCA + misconfiguration scan of the working tree
#
# CodeQL is intentionally NOT in this workflow. The repository uses GitHub's
# default-setup code scanning (Security → Code scanning), which is mandated by
# org policy. Advanced-setup CodeQL runs via a workflow would conflict with
# the default setup — GitHub rejects the SARIF upload with "advanced
# configurations cannot be processed when default setup is enabled."
#
# Triggers on pushes to main, all pull requests, and weekly on Mondays 06:00 UTC.
# Findings are uploaded to the GitHub Security tab as SARIF where supported.
#
name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # Weekly on Mondays at 06:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # govulncheck — Go vulnerability database scan
  # ─────────────────────────────────────────────────────────────────────────
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run govulncheck
        run: mise exec -- govulncheck ./...

  # ─────────────────────────────────────────────────────────────────────────
  # Trivy (filesystem) — dependency + misconfiguration scan
  # ─────────────────────────────────────────────────────────────────────────
  trivy-fs:
    name: Trivy (filesystem)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          ignore-unfixed: true
          severity: CRITICAL,HIGH,MEDIUM

      - name: Upload Trivy SARIF to code scanning
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs
