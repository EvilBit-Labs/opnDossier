name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Lint - Fast feedback on code quality
  # ─────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9 # The version should be handled by mise, but we specify it here to ensure consistency
        with:
          version: v2.11.3

  # ─────────────────────────────────────────────────────────────────────────
  # Test - Run tests across platforms and Go versions
  #
  # Support policy: opnDossier supports the current and previous stable Go
  # releases (N and N-1), matching Go's upstream release policy. The matrix
  # below exercises both `stable` and `oldstable`; mise still drives lint,
  # format, and the rest of the toolchain — `actions/setup-go` is layered on
  # top of mise here purely to override the Go toolchain for this job.
  # ─────────────────────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }}, ${{ matrix.go-version }})
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: [stable, oldstable]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go (${{ matrix.go-version }})
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      # NOTE: Invoke `go` directly rather than `just test` / `just ci-smoke`.
      # The justfile recipes shell out via `mise exec -- go`, which would pin
      # the toolchain to the mise-managed version and defeat the N/N-1 matrix.
      # Running `go` directly lets `actions/setup-go` (which runs after
      # mise-action and therefore wins PATH order) drive the toolchain.
      - name: Run tests (Unix)
        if: runner.os != 'Windows'
        run: go test ./...

      - name: Run tests (Windows) # I don't remember why this is necessary, but I believe it was due to the speed of tests on the Windows runners
        if: runner.os == 'Windows'
        run: |
          go build -trimpath -ldflags="-s -w -X main.version=dev" -v ./...
          go test -count=1 -failfast -short -timeout 5m ./cmd/... ./internal/config/...

  # ─────────────────────────────────────────────────────────────────────────
  # Integration Tests - E2E testing with real config files
  # ─────────────────────────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run integration tests
        run: go test -tags=integration -v -timeout 5m ./...

  # ─────────────────────────────────────────────────────────────────────────
  # Coverage - Generate and upload coverage report
  # ─────────────────────────────────────────────────────────────────────────
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run tests with coverage
        run: just test-coverage

      - name: Upload to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.txt
          fail_ci_if_error: true

  # ─────────────────────────────────────────────────────────────────────────
  # Build - Verify builds across platforms
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build release binary
        run: just build-release

      - name: Verify binary
        run: ./opndossier --version || ./opndossier --help

      - name: Cross-compile check
        run: |
          GOOS=linux GOARCH=amd64 go build -o /dev/null main.go
          GOOS=darwin GOARCH=amd64 go build -o /dev/null main.go
          GOOS=darwin GOARCH=arm64 go build -o /dev/null main.go
          GOOS=windows GOARCH=amd64 go build -o /dev/null main.go

  # ─────────────────────────────────────────────────────────────────────────
  # SBOM Generation
  #
  # Only runs on push-to-main. Rationale:
  #   - goreleaser's release-time SBOMs (see .goreleaser.yaml `sboms:`) are
  #     the authoritative SBOMs shipped with each release artifact.
  #   - .github/workflows/sbom.yml runs on a weekly schedule to catch drift
  #     in dependency graphs between releases.
  #   - Running SBOM generation on every PR was duplicative and added ~2min
  #     of CI time per PR without surfacing new information.
  # If you need an SBOM for a PR locally, use `just sbom` or run
  # `cyclonedx-gomod` directly.
  # ─────────────────────────────────────────────────────────────────────────
  sbom:
    name: Generate SBOM
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build binary
        run: just build-release

      - name: Generate SBOM from binary (CycloneDX)
        uses: CycloneDX/gh-gomod-generate-sbom@efc74245d6802c8cefd925620515442756c70d8f # v2
        with:
          version: v1.9.0
          args: bin -output sbom-binary.cyclonedx.json ./opndossier

      - name: Generate SBOM from modules (CycloneDX)
        uses: CycloneDX/gh-gomod-generate-sbom@efc74245d6802c8cefd925620515442756c70d8f # v2
        with:
          version: v1.9.0
          args: app -output sbom-modules.cyclonedx.json -json .

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-reports
          path: |
            sbom-binary.cyclonedx.json
            sbom-modules.cyclonedx.json
          retention-days: 90
