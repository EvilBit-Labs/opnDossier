# yaml-language-server: $schema=https://golangci-lint.run/jsonschema/golangci.jsonschema.json
version: "2"

run:
  concurrency: 8
  timeout: 30m
  issues-exit-code: 1
  tests: true
  modules-download-mode: readonly
  allow-parallel-runners: false

linters:
  enable:
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - contextcheck
    - canonicalheader
    - containedctx
    - copyloopvar
    - cyclop
    - decorder
    - dupl
    - durationcheck
    - embeddedstructfieldcheck
    - errchkjson
    - errcheck
    - errname
    - errorlint
    # - exhaustive - disabled: we'll come back to this after 1.0
    # - exhaustruct - disabled: we'll come back to this after 1.0
    - exptostd
    - ginkgolinter
    - fatcontext
    - forbidigo
    - funcorder
    # - funlen - Disabled: we'll come back to this after 1.0
    - gocheckcompilerdirectives
    - gochecksumtype
    # - gocognit - Disabled: we'll come back to this after 1.0
    - goconst
    - gocritic
    # - gocyclo - Disabled in favor of cyclop (see disable section)
    - godot
    - gomoddirectives
    - goprintffuncname
    - gosec
    - govet
    - iface
    - inamedparam
    - ineffassign
    - intrange
    - loggercheck
    - makezero
    - mirror
    - mnd
    - musttag
    - nakedret
    # - nestif - Disabled: we'll come back to this after 1.0
    - nilerr
    - nilnesserr
    - nilnil
    - noctx
    - nolintlint
    - nonamedreturns
    - nosprintfhostport
    - perfsprint
    # - prealloc # Disabled: this can be premature optimization
    - predeclared
    - promlinter
    - protogetter
    - reassign
    - recvcheck
    - revive
    - rowserrcheck
    - sloglint
    - spancheck
    - sqlclosecheck
    - staticcheck
    #- tagliatelle # Disabled: currently this is more trouble than it's worth
    - testableexamples
    - thelper
    - testifylint
    - tparallel
    - unconvert
    - unparam
    - unused
    - usestdlibvars
    - usetesting
    - wastedassign
    - whitespace
  exclusions:
    generated: lax
    presets:
      - common-false-positives
      - std-error-handling
    rules:
      - path: pkg/model/
        linters: [revive]
        text: "var-naming: avoid meaningless package names"
      # forbidigo is used solely to enforce "no t.Parallel() in cmd/" (see
      # settings.forbidigo below and GOTCHAS §1.1). Restrict the linter to cmd/
      # so its single rule does not leak into the rest of the tree. If a future
      # forbidigo rule needs broader scope, switch to per-rule scoping.
      - path-except: 'cmd/.*\.go$'
        linters: [forbidigo]
  disable:
    - gomodguard # Disabled: maybe someday, but not important right now
    - gocyclo # Disabled in favor of cyclop
    - testpackage
    - gochecknoglobals # Disabled: causes issues with cobra commands
  settings:
    cyclop:
      max-complexity: 50
      package-average: 10.0
    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
      disabled-checks:
        - hugeParam
        - rangeExprCopy
        - rangeValCopy
      settings:
        captLocal:
          paramsOnly: false
        underef:
          skipRecvDeref: false

    embeddedstructfieldcheck:
      forbid-mutex: true
    tagliatelle:
      case:
        overrides:
          - pkg: pkg/parser/opnsense
            ignore: true

    errcheck:
      check-type-assertions: true
      check-blank: true
      exclude-functions:
        - io/ioutil.ReadFile
        - io.Copy(*bytes.Buffer)
        - io.Copy(os.Stdout)
    exhaustive:
      check:
        - switch
        - map
    exhaustruct:
      exclude:
        - ^net/http.Client$
        - ^net/http.Cookie$
        - ^net/http.Request$
        - ^net/http.Response$
        - ^net/http.Server$
        - ^net/http.Transport$
        - ^net/url.URL$
        - ^os/exec.Cmd$
        - ^reflect.StructField$
        - ^github.com/Shopify/sarama.Config$
        - ^github.com/Shopify/sarama.ProducerMessage$
        - ^github.com/mitchellh/mapstructure.DecoderConfig$
        - ^github.com/prometheus/client_golang/.+Opts$
        - ^github.com/spf13/cobra.Command$
        - ^github.com/spf13/cobra.CompletionOptions$
        - ^github.com/stretchr/testify/mock.Mock$
        - ^github.com/testcontainers/testcontainers-go.+Request$
        - ^github.com/testcontainers/testcontainers-go.FromDockerfile$
        - ^golang.org/x/tools/go/analysis.Analyzer$
        - ^google.golang.org/protobuf/.+Options$
        - ^gopkg.in/yaml.v3.Node$
    forbidigo:
      # Type-aware matching so we catch t.Parallel() regardless of the local
      # variable name (t, tt, tc, etc.).
      analyze-types: true
      forbid:
        # GOTCHAS §1.1: the cmd package uses package-level CLI flag globals
        # (sharedDeviceType, sharedAuditMode, outputFile, format, force, ...).
        # Any test that calls t.Parallel() risks a data race with sibling
        # tests that mutate those globals. The race detector reports collateral
        # races in unrelated utilities, so the policy is a blanket ban in cmd/.
        # Scope is enforced by the path-except rule under linters.exclusions.
        - pattern: '^testing\.T\.Parallel$'
          msg: 'cmd/ tests must not call t.Parallel(): cmd uses package-level CLI flag globals that race under parallel execution. See GOTCHAS §1.1.'
    funcorder:
      struct-method: false
    funlen:
      lines: 60
      statements: 40
    gochecksumtype:
      default-signifies-exhaustive: false
    gocognit:
      min-complexity: 30

    gosec:
      excludes:
        - G301 # Man pages require 755 permissions for public access
        - G304 # Loading user-specified templates is expected CLI behavior
    govet:
      enable-all: true
      disable:
        - fieldalignment # Disabled: this is a known issue with the govet tool
        - shadow # Disabled temporarily to focus on other issues first
    inamedparam:
      skip-single-param: true

    mnd:
      ignored-functions:
        - args.Error
        - flag.Arg
        - flag.Duration.*
        - flag.Float.*
        - flag.Int.*
        - flag.Uint.*
        - os.Chmod
        - os.Mkdir.*
        - os.OpenFile
        - os.WriteFile
        - prometheus.ExponentialBuckets.*
        - prometheus.LinearBuckets

    nakedret:
      max-func-lines: 1
    nolintlint:
      allow-no-explanation: [ funlen, gocognit, golines ]
      require-explanation: true
      require-specific: true
    rowserrcheck:
      packages:
        - github.com/jmoiron/sqlx
    sloglint:
      no-global: all
      context: scope
    staticcheck:
      checks:
        - all
        - -ST1000
        - -ST1016
        - -QF1008
    usetesting:
      os-temp-dir: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false
  uniq-by-line: true
  fix: true
formatters:
  enable:
    - golines
    - gofumpt
    - goimports
    - gci
  settings:
    gofumpt:
      module-path: "github.com/EvilBit-Labs/opnDossier"
      extra-rules: true
    golines:
      max-len: 120
  exclusions:
    generated: lax
