# yaml-language-server: $schema=https://golangci-lint.run/jsonschema/golangci.jsonschema.json
version: "2"

run:
  concurrency: 8
  timeout: 30m
  issues-exit-code: 1
  tests: true
  modules-download-mode: readonly
  allow-parallel-runners: false

linters:
  enable:
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - contextcheck
    - canonicalheader
    - containedctx
    - copyloopvar
    - cyclop
    - decorder
    - dupl
    - durationcheck
    - embeddedstructfieldcheck
    - errchkjson
    - errcheck
    - errname
    - errorlint
    - exhaustive
    # - exhaustruct - Disabled: the project's idiom for declarative data (compliance
    #   plugin Control tables, diff/sanitizer rule lists, config validation records)
    #   is partial struct literals with intentionally zero-valued optional fields.
    #   Exhaustruct flags 500+ of these as "missing fields" across internal/plugins/,
    #   internal/diff/, internal/sanitizer/rules.go, internal/config/validation.go,
    #   and internal/*/example.go. Fighting this would require either hundreds of
    #   //nolint directives or a brittle struct-name exclude list. Go's zero-value
    #   guarantee already covers the "forgot to initialize" case exhaustruct is
    #   designed to catch, so the safety gain does not justify the maintenance cost.
    - exptostd
    - ginkgolinter
    - fatcontext
    - forbidigo
    - funcorder
    # - funlen - Staged-enable: TODO sweep current findings (49 at lines=120,
    #   statements=80), then uncomment. Target settings are active below so the
    #   threshold is ready the moment the linter re-activates.
    - gocheckcompilerdirectives
    - gochecksumtype
    - gocognit
    - goconst
    - gocritic
    - godot
    - gomoddirectives
    - goprintffuncname
    - gosec
    - govet
    - iface
    - inamedparam
    - ineffassign
    - intrange
    - loggercheck
    - makezero
    - mirror
    - mnd
    - musttag
    - nakedret
    - nestif
    - nilerr
    - nilnesserr
    - nilnil
    - noctx
    - nolintlint
    - nonamedreturns
    - nosprintfhostport
    - perfsprint
    # - prealloc - Disabled: this can be premature optimization. Probed 2026-04-19:
    #   12 findings, 8 of which are validator error-collector slices where the common
    #   case is zero errors (preallocating cap=len(items) would over-allocate).
    #   The 4 legitimate findings (guaranteed-length transforms in plaintext.go,
    #   config_test.go, and plugin test helpers) are easier to catch in code review
    #   than via a lint rule that also recommends the anti-pattern on validators.
    #   AGENTS.md documents the manual-review expectation. See also: prealloc would
    #   need an exclusion list per-directory to avoid steering us wrong.
    - predeclared
    - promlinter
    - protogetter
    - reassign
    - recvcheck
    - revive
    - rowserrcheck
    - sloglint
    - spancheck
    - sqlclosecheck
    - staticcheck
    # - tagliatelle - Permanently disabled: the vendor-controlled config.xml schema
    #   mixes casing conventions (hostname, descr, sourceport, created-time, Phase1).
    #   Our Go types mirror that reality; enforcing a single case convention fights
    #   the input format we do not control.
    - testableexamples
    - thelper
    - testifylint
    - tparallel
    - unconvert
    - unparam
    - unused
    - usestdlibvars
    - usetesting
    - wastedassign
    - whitespace
  exclusions:
    generated: lax
    presets:
      - common-false-positives
      - std-error-handling
    rules:
      - path: pkg/model/
        linters: [revive]
        text: "var-naming: avoid meaningless package names"
      # forbidigo is used solely to enforce "no t.Parallel() in cmd/" (see
      # settings.forbidigo below and GOTCHAS §1.1). Restrict the linter to cmd/
      # so its single rule does not leak into the rest of the tree. If a future
      # forbidigo rule needs broader scope, switch to per-rule scoping.
      - path-except: 'cmd/.*\.go$'
        linters: [forbidigo]
      # SA1019 deprecation warnings are expected in these test files — they
      # exist specifically to exercise the deprecated config.Config flat
      # fields (Verbose, Debug, Quiet, Theme, Format) until v2.0 removal.
      # See GOTCHAS §21 "Config Flat→Nested Deprecation" and CHANGELOG
      # Unreleased/Deprecated for removal tracking.
      - path: 'internal/config/(config_test|config_coverage_test|validation_test)\.go$'
        linters: [staticcheck]
        text: 'SA1019:'
  disable:
    - gomodguard # Disabled: maybe someday, but not important right now
    - gocyclo # Disabled in favor of cyclop (which supersedes it with per-package averages)
    - testpackage # Disabled: tests live in the same package to exercise unexported helpers
    - gochecknoglobals # Disabled: causes issues with cobra commands
  settings:
    cyclop:
      # Current (2026-04-19): max-complexity=50 preserves the pre-sweep
      # baseline (green CI). Target after sweep: 25, which matches the
      # skill's recommended adjusted threshold (Go default is 15). Probed:
      # 7 findings at 25, concentrated in ~10 files. When the sweep drops
      # this to 25, update the comment and the rationale below.
      max-complexity: 50
      package-average: 10.0
    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
      disabled-checks:
        - hugeParam
        - rangeExprCopy
        - rangeValCopy
      settings:
        captLocal:
          paramsOnly: false
        underef:
          skipRecvDeref: false

    embeddedstructfieldcheck:
      forbid-mutex: true

    errcheck:
      check-type-assertions: true
      check-blank: true
      exclude-functions:
        - io/ioutil.ReadFile
        - io.Copy(*bytes.Buffer)
        - io.Copy(os.Stdout)
    exhaustive:
      check:
        - switch
        - map
      # Any switch with a default: branch is treated as exhaustive. This
      # matches the project's convention where partial switches on large
      # enum-style types (e.g., reflect.Kind) include an explicit default
      # that documents "no-op for kinds not listed" rather than listing
      # every kind just to satisfy the linter.
      default-signifies-exhaustive: true
    forbidigo:
      # Type-aware matching so we catch t.Parallel() regardless of the local
      # variable name (t, tt, tc, etc.).
      analyze-types: true
      forbid:
        # GOTCHAS §1.1: the cmd package uses package-level CLI flag globals
        # (sharedDeviceType, sharedAuditMode, outputFile, format, force, ...).
        # Any test that calls t.Parallel() risks a data race with sibling
        # tests that mutate those globals. The race detector reports collateral
        # races in unrelated utilities, so the policy is a blanket ban in cmd/.
        # Scope is enforced by the path-except rule under linters.exclusions.
        - pattern: '^testing\.T\.Parallel$'
          msg: 'cmd/ tests must not call t.Parallel(): cmd uses package-level CLI flag globals that race under parallel execution. See GOTCHAS §1.1.'
    funcorder:
      struct-method: false
    funlen:
      # Raised from default 60/40 → 120/80 to accommodate existing long-but-
      # linear functions that cyclop/gocognit do not flag (those measure
      # branching, not length). 120 lines catches real sprawl without
      # drowning in warnings on reasonable-length CLI handlers.
      lines: 120
      statements: 80
    gochecksumtype:
      default-signifies-exhaustive: false
    gocognit:
      # 40 (vs. Go default 15, skill-recommended 30). Sweep on 2026-04-19
      # cleared the baseline at this threshold. Can tighten to 30 in a
      # follow-up once more of the hot spots (validators, walker, test
      # helpers) have settled; dropping in one step would re-open several
      # of the same files this sweep just refactored.
      min-complexity: 40

    gosec:
      excludes:
        - G301 # Man pages require 755 permissions for public access
        - G304 # Loading user-specified templates is expected CLI behavior
    govet:
      enable-all: true
      disable:
        - fieldalignment # Disabled: this is a known issue with the govet tool
        - shadow # Disabled temporarily to focus on other issues first
    inamedparam:
      skip-single-param: true

    nestif:
      # 8 (vs. Go default 5). Complements cyclop + gocognit from the
      # deep-nesting angle — catches "pyramid of doom" patterns that
      # branching counts alone do not flag. Sweep on 2026-04-19 cleared
      # the baseline; any re-add of a 9+-nested block will fail CI.
      min-complexity: 8

    mnd:
      ignored-functions:
        - args.Error
        - flag.Arg
        - flag.Duration.*
        - flag.Float.*
        - flag.Int.*
        - flag.Uint.*
        - os.Chmod
        - os.Mkdir.*
        - os.OpenFile
        - os.WriteFile
        - prometheus.ExponentialBuckets.*
        - prometheus.LinearBuckets

    nakedret:
      max-func-lines: 1
    nolintlint:
      allow-no-explanation: [ funlen, gocognit, golines ]
      require-explanation: true
      require-specific: true
    rowserrcheck:
      packages:
        - github.com/jmoiron/sqlx
    sloglint:
      no-global: all
      context: scope
    staticcheck:
      checks:
        - all
        - -ST1000
        - -ST1016
        - -QF1008
    usetesting:
      os-temp-dir: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false
  uniq-by-line: true
  fix: true
formatters:
  enable:
    - golines
    - gofumpt
    - goimports
    - gci
  settings:
    gofumpt:
      module-path: "github.com/EvilBit-Labs/opnDossier"
      extra-rules: true
    golines:
      max-len: 120
  exclusions:
    generated: lax
